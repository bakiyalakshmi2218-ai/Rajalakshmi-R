<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini E-Commerce Cart System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#6dd5ed,#2193b0,#4facfe);
    min-height:100vh;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:white;
    font-size:38px;
    text-shadow:2px 2px 6px rgba(0,0,0,0.4);
}

.container{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.products,.cart{
    flex:1;
    min-width:320px;
    background:rgba(255,255,255,0.95);
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.products:hover,
.cart:hover{
    transform:translateY(-5px);
}

.products h2,
.cart h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.product{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #ddd;
}

button{
    background:linear-gradient(45deg,#ff6a00,#ee0979);
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:linear-gradient(45deg,#ee0979,#ff6a00);
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
    padding:12px 0;
}

.qty{
    display:flex;
    align-items:center;
}

.qty button{
    width:30px;
    height:30px;
    margin:0 5px;
    padding:0;
}

.remove{
    background:linear-gradient(45deg,#ff0000,#b30000);
}

.remove:hover{
    background:linear-gradient(45deg,#b30000,#ff0000);
}

.total{
    margin-top:20px;
    text-align:right;
    font-size:22px;
    font-weight:bold;
    color:#007bff;
}
</style>
</head>

<body>

<h1>🛒 Mini E-Commerce Cart System</h1>

<div class="container">

<div class="products">
<h2>Products</h2>
<div id="productList"></div>
</div>

<div class="cart">
<h2>Shopping Cart</h2>
<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

</div>

</div>

<script>

const products=[
{id:1,name:"💻 Laptop",price:50000},
{id:2,name:"📱 Smartphone",price:25000},
{id:3,name:"🎧 Headphones",price:2000},
{id:4,name:"⌨️ Keyboard",price:1500},
{id:5,name:"🖱️ Mouse",price:800}
];

let cart=[];

function displayProducts(){

const productList=document.getElementById("productList");
productList.innerHTML="";

products.forEach(product=>{

productList.innerHTML+=`
<div class="product">

<div>
<h3>${product.name}</h3>
<p><b>Price:</b> ₹${product.price}</p>
</div>

<button onclick="addToCart(${product.id})">
Add to Cart
</button>

</div>
`;

});

}

function addToCart(id){

const item=cart.find(product=>product.id===id);

if(item){

item.quantity++;

}else{

const product=products.find(product=>product.id===id);

cart.push({
...product,
quantity:1
});

}

displayCart();

}

function displayCart(){

const cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";

let total=0;

if(cart.length===0){

cartItems.innerHTML="<p>Your cart is empty.</p>";

}

cart.forEach(item=>{

total+=item.price*item.quantity;

cartItems.innerHTML+=`

<div class="cart-item">

<div>

<b>${item.name}</b><br>

₹${item.price}

</div>

<div class="qty">

<button onclick="changeQty(${item.id},-1)">-</button>

<span>${item.quantity}</span>

<button onclick="changeQty(${item.id},1)">+</button>

</div>

<button class="remove" onclick="removeItem(${item.id})">

Remove

</button>

</div>

`;

});

document.getElementById("total").innerText=total;

}

function changeQty(id,value){

const item=cart.find(product=>product.id===id);

item.quantity+=value;

if(item.quantity<=0){

removeItem(id);

}else{

displayCart();

}

}

function removeItem(id){

cart=cart.filter(product=>product.id!==id);

displayCart();

}

displayProducts();

</script>

</body>
</html>
